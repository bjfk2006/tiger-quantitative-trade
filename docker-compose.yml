# option_bot 单服务编排（设计增量 §3/§13；不含 caddy，TLS 由用户自备反代）
services:
  option-bot:
    build: .
    image: option-bot:latest
    container_name: option-bot
    restart: unless-stopped
    env_file:
      - .env
    ports:
      # 看板：外网可达（用户名/密码）
      - "8000:8000"
      # 操作面：宿主侧只绑回环(127.0.0.1)——M4 防误暴露。
      # 即使 OBOT_OPS_EXPOSE=true 让容器绑 0.0.0.0，宿主侧也只在本机可达(供 SSH 隧道/本机)。
      # 确需公网暴露操作面：手动改成 "8001:8001" 并设 OBOT_OPS_EXPOSE=true + 反代TLS。
      - "127.0.0.1:8001:8001"
    volumes:
      # 持久化：SQLite db、token、state、私钥都放这里
      - ./data:/app/data
