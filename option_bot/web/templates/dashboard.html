<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>option_bot 看板</title>
<style>
  body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; margin: 16px; background:#0f1115; color:#e6e6e6; }
  h2 { margin: 18px 0 8px; font-size: 16px; }
  table { border-collapse: collapse; width: 100%; font-size: 13px; }
  th, td { border: 1px solid #2a2f3a; padding: 6px 8px; text-align: right; }
  th { background:#1a1e27; text-align: right; }
  td.l, th.l { text-align: left; }
  .pos { color:#4caf50; } .neg { color:#ef5350; }
  .bar { display:flex; align-items:center; gap:10px; }
  .dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
  .alive { background:#4caf50; } .dead { background:#ef5350; }
  .muted { color:#8a909c; font-size:12px; }
  .hist-form { margin:8px 0; display:flex; gap:12px; flex-wrap:wrap; align-items:center; font-size:13px; }
  .hist-form input, .hist-form select { background:#1a1e27; color:#e6e6e6; border:1px solid #2a2f3a; padding:3px; }
  button { background:#2a6; color:#fff; border:0; padding:5px 12px; border-radius:4px; cursor:pointer; }
</style>
</head>
<body>
  <div class="bar">
    <h2 style="margin:0">option_bot 看板</h2>
    <span class="dot" id="dot"></span><span id="botState" class="muted"></span>
    <span class="muted">· 自动刷新 3s</span>
  </div>

  <h2>当前持仓</h2>
  <table>
    <thead><tr>
      <th class="l">标识</th><th class="l">方向</th><th>数量</th><th>入场价</th>
      <th>现价</th><th>未实现盈亏</th><th>盈亏%</th><th class="l">状态</th>
    </tr></thead>
    <tbody id="posBody"><tr><td class="l muted" colspan="8">加载中…</td></tr></tbody>
  </table>

  <h2>交易记录</h2>
  <table>
    <thead><tr>
      <th class="l">时间</th><th class="l">动作</th><th class="l">标识</th><th class="l">方向</th>
      <th>数量</th><th>价格</th><th class="l">原因</th><th>平仓盈亏%</th>
    </tr></thead>
    <tbody id="tradeBody"><tr><td class="l muted" colspan="8">加载中…</td></tr></tbody>
  </table>

  <h2>历史统计（已平仓，美东时区）</h2>
  <div class="hist-form">
    <label>从 <input type="date" id="hFrom"></label>
    <label>到 <input type="date" id="hTo"></label>
    <label>账户 <input id="hAccount" placeholder="留空=全部" size="10"></label>
    <label>标识 <select id="hIdent"><option value="">全部</option></select></label>
    <button onclick="loadIdentifiers()">刷新标识</button>
    <button onclick="loadHistory();loadTicks()">查询</button>
  </div>
  <div id="histSummary" class="muted">选时间范围 → 刷新标识 → 查询</div>
  <svg id="equity" width="100%" height="120" style="background:#1a1e27;border:1px solid #2a2f3a;margin:8px 0;display:block"></svg>
  <table>
    <thead><tr>
      <th class="l">平仓时间</th><th class="l">标识</th><th class="l">方向</th><th>数量</th>
      <th>开仓价</th><th>平仓价</th><th class="l">原因</th><th>盈亏%</th><th>盈亏$</th>
    </tr></thead>
    <tbody id="histBody"><tr><td class="l muted" colspan="9">—</td></tr></tbody>
  </table>

  <h2>持仓走势（逐 tick，选具体标识）</h2>
  <div class="hist-form">
    指标 <select id="tickMetric" onchange="loadTicks()">
      <option value="pnl">盈亏%</option>
      <option value="price">现价</option>
    </select>
    <span id="tickInfo" class="muted">上方选一个具体标识 → 查询</span>
  </div>
  <svg id="tickChart" width="100%" height="160" style="background:#1a1e27;border:1px solid #2a2f3a;margin:8px 0;display:block"></svg>

<script>
function fmt(v, d) { return (v === null || v === undefined) ? '' : (typeof v === 'number' ? v.toFixed(d) : v); }
function pctCell(v) {
  if (v === null || v === undefined) return '<td></td>';
  const cls = v >= 0 ? 'pos' : 'neg';
  return '<td class="' + cls + '">' + (v >= 0 ? '+' : '') + v.toFixed(1) + '%</td>';
}
function ts(ms) { if (!ms) return ''; const d = new Date(ms); return d.toLocaleString(); }

async function refresh() {
  try {
    const [hs, ps, tr] = await Promise.all([
      fetch('/healthz').then(r => r.json()),
      fetch('/api/positions').then(r => r.json()),
      fetch('/api/trades?limit=100').then(r => r.json()),
    ]);
    const dot = document.getElementById('dot');
    const alive = hs && hs.bot_alive;
    dot.className = 'dot ' + (alive ? 'alive' : 'dead');
    document.getElementById('botState').textContent = 'bot: ' + (alive ? 'alive' : 'down');

    document.getElementById('posBody').innerHTML = (ps && ps.length)
      ? ps.map(p =>
        '<tr><td class="l">' + p.identifier + '</td><td class="l">' + p.direction +
        '</td><td>' + fmt(p.qty, 0) + '</td><td>' + fmt(p.entry_price, 2) +
        '</td><td>' + fmt(p.market_price, 2) + '</td><td>' + fmt(p.unrealized_pnl, 2) +
        '</td>' + pctCell(p.unrealized_pnl_percent) + '<td class="l">' + (p.state || '') + '</td></tr>'
      ).join('')
      : '<tr><td class="l muted" colspan="8">无持仓</td></tr>';

    document.getElementById('tradeBody').innerHTML = (tr && tr.length)
      ? tr.map(t =>
        '<tr><td class="l">' + ts(t.ts) + '</td><td class="l">' + t.action +
        '</td><td class="l">' + t.identifier + '</td><td class="l">' + t.direction +
        '</td><td>' + fmt(t.qty, 0) + '</td><td>' + fmt(t.price, 2) +
        '</td><td class="l">' + (t.reason || '') + '</td>' + pctCell(t.pnl_percent) + '</tr>'
      ).join('')
      : '<tr><td class="l muted" colspan="8">无记录</td></tr>';
  } catch (e) {
    document.getElementById('botState').textContent = 'refresh error';
  }
}
refresh();
setInterval(refresh, 3000);

// ---------- 历史统计 ----------
function q(id){ return document.getElementById(id); }
function amtCell(v){ if(v===null||v===undefined) return '<td></td>'; const c=v>=0?'pos':'neg'; return '<td class="'+c+'">'+(v>=0?'+':'')+'$'+v.toFixed(2)+'</td>'; }
// 下拉项把账户编进 value（account|identifier），避免同合约的实盘/模拟两笔混在一条线
function selIdent(){
  const v=q('hIdent').value; if(!v) return null;
  const i=v.indexOf('|'); return {account:v.slice(0,i), identifier:v.slice(i+1)};
}
function histParams(withIdent){
  const p = new URLSearchParams();
  if(q('hFrom').value) p.set('from', q('hFrom').value);
  if(q('hTo').value) p.set('to', q('hTo').value);
  let acct = q('hAccount').value;
  const si = withIdent ? selIdent() : null;
  if(si){ p.set('identifier', si.identifier); if(si.account) acct = si.account; }
  if(acct) p.set('account', acct);
  return p;
}
async function loadIdentifiers(){
  try{
    const list = await fetch('/api/history/identifiers?'+histParams(false)).then(r=>r.json());
    const sel = q('hIdent'), cur = sel.value;
    sel.innerHTML = '<option value="">全部</option>' + (Array.isArray(list)?list:[]).map(x=>
      '<option value="'+(x.account||'')+'|'+x.identifier+'">'+x.identifier+' ('+x.symbol+', 户'+(x.account||'?')+', '+x.n+'笔)</option>').join('');
    sel.value = cur;
  }catch(e){}
}
function drawEquity(curve){
  const svg=q('equity'), W=svg.clientWidth||600, H=120, pad=10;
  if(!curve || !curve.length){ svg.innerHTML=''; return; }
  const xs=curve.map(p=>p.ts), ys=curve.map(p=>p.cum_pnl);
  const xmin=Math.min(...xs), xmax=Math.max(...xs), ymin=Math.min(0,...ys), ymax=Math.max(0,...ys);
  const sx=t=> pad + (xmax===xmin?0:(t-xmin)/(xmax-xmin))*(W-2*pad);
  const sy=v=> H-pad - (ymax===ymin?0:(v-ymin)/(ymax-ymin))*(H-2*pad);
  const pts=curve.map(p=>sx(p.ts).toFixed(1)+','+sy(p.cum_pnl).toFixed(1)).join(' ');
  const zero=sy(0).toFixed(1), last=ys[ys.length-1];
  svg.innerHTML='<line x1="0" y1="'+zero+'" x2="'+W+'" y2="'+zero+'" stroke="#3a3f4a"/>'+
    '<polyline points="'+pts+'" fill="none" stroke="'+(last>=0?'#4caf50':'#ef5350')+'" stroke-width="2"/>';
}
async function loadHistory(){
  try{
    const d = await fetch('/api/history?'+histParams(true)).then(r=>r.json());
    const s = d.summary||{}, tot = s.total_pnl_amount||0;
    q('histSummary').innerHTML =
      '总盈亏 <b class="'+(tot>=0?'pos':'neg')+'">'+(tot>=0?'+':'')+'$'+tot.toFixed(2)+'</b> · 胜率 '+
      ((s.win_rate||0)*100).toFixed(1)+'% · 笔数 '+(s.count||0)+'(赢'+(s.wins||0)+'/亏'+(s.losses||0)+
      ') · 平均 '+(s.avg_pnl_percent||0).toFixed(1)+'% · 最大盈 $'+(s.max_win||0).toFixed(0)+
      ' / 最大亏 $'+(s.max_loss||0).toFixed(0);
    drawEquity(d.equity_curve);
    q('histBody').innerHTML = (d.trades && d.trades.length) ? d.trades.map(t=>
      '<tr><td class="l">'+ts(t.close_ts)+'</td><td class="l">'+t.identifier+'</td><td class="l">'+t.direction+
      '</td><td>'+fmt(t.qty,0)+'</td><td>'+fmt(t.open_price,2)+'</td><td>'+fmt(t.close_price,2)+
      '</td><td class="l">'+(t.reason||'')+'</td>'+pctCell(t.pnl_percent)+amtCell(t.pnl_amount)+'</tr>'
    ).join('') : '<tr><td class="l muted" colspan="9">无记录</td></tr>';
  }catch(e){ q('histSummary').textContent='查询失败'; }
}
// ---------- 逐tick 持仓走势 ----------
function drawTicks(rows, metric){
  const svg=q('tickChart'), W=svg.clientWidth||600, H=160, pad=12;
  if(!rows || !rows.length){ svg.innerHTML=''; return; }
  const key = metric==='price' ? 'market_price' : 'unrealized_pnl_percent';
  const xs=rows.map(p=>p.ts), ys=rows.map(p=>(p[key]==null?0:p[key]));
  const xmin=Math.min(...xs), xmax=Math.max(...xs);
  let ymin=Math.min(...ys), ymax=Math.max(...ys);
  if(metric!=='price'){ ymin=Math.min(0,ymin); ymax=Math.max(0,ymax); }
  if(ymin===ymax){ ymax=ymin+1; }
  const sx=t=> pad + (xmax===xmin?0:(t-xmin)/(xmax-xmin))*(W-2*pad);
  const sy=v=> H-pad - (v-ymin)/(ymax-ymin)*(H-2*pad);
  const pts=rows.map(p=>sx(p.ts).toFixed(1)+','+sy(p[key]==null?ymin:p[key]).toFixed(1)).join(' ');
  let extra='';
  if(metric!=='price'){ const z=sy(0).toFixed(1); extra='<line x1="0" y1="'+z+'" x2="'+W+'" y2="'+z+'" stroke="#3a3f4a"/>'; }
  const last=ys[ys.length-1];
  const col = metric==='price' ? '#5b9bd5' : (last>=0?'#4caf50':'#ef5350');
  svg.innerHTML=extra+'<polyline points="'+pts+'" fill="none" stroke="'+col+'" stroke-width="1.5"/>';
}
async function loadTicks(){
  const si=selIdent();
  if(!si){ q('tickInfo').textContent='请在上方「标识」选具体合约（非"全部"）'; q('tickChart').innerHTML=''; return; }
  try{
    const d=await fetch('/api/ticks?'+histParams(true)).then(r=>r.json());
    const shown=d.ticks?d.ticks.length:0;
    q('tickInfo').textContent=si.identifier+'：'+(d.count||0)+' 个 tick'+((d.count||0)>shown?'（抽样到'+shown+'点）':'');
    drawTicks(d.ticks||[], q('tickMetric').value);
  }catch(e){ q('tickInfo').textContent='查询失败'; }
}
// 默认展示近 7 天（含昨天/今晚的交易），避免"打开就空"的默认日期坑
(function(){
  const today=new Date();
  q('hTo').value = today.toISOString().slice(0,10);
  q('hFrom').value = new Date(today.getTime()-7*86400000).toISOString().slice(0,10);
  loadIdentifiers();
})();
</script>
</body>
</html>
